services:
  - type: web
    name: chat-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true


databases:
  - name: chat-db
    databaseName: chat
    user: chat_user
    plan: free
